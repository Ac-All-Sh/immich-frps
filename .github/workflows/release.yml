name: Build and Release frps-panel (全架构)

on:
  push:
    branches:
      - frps-panel
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - 'doc.html'
  workflow_dispatch:
    inputs:
      frp_version:
        description: 'frp 版本号 (如 0.69.1，留空则自动获取最新)'
        required: false
        default: ''

env:
  REGISTRY: docker.io
  IMAGE_NAME: acallsh/frps-panel
  MODULE_PATH: github.com/xxl6097/go-frp-panel

jobs:
  # ==================== 获取 frp 版本 ====================
  get-version:
    runs-on: ubuntu-latest
    outputs:
      frp_version: ${{ steps.version.outputs.frp_version }}
      panel_version: ${{ steps.version.outputs.panel_version }}
      build_date: ${{ steps.version.outputs.build_date }}
    steps:
      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.frp_version }}" ]; then
            FRP_VERSION="${{ github.event.inputs.frp_version }}"
          else
            FRP_VERSION=$(curl -s https://api.github.com/repos/fatedier/frp/releases/latest | grep '"tag_name"' | sed -E 's/.*"v([^"]+)".*/\1/')
            if [ -z "$FRP_VERSION" ]; then
              FRP_VERSION="0.69.1"
            fi
          fi
          PANEL_VERSION="v${FRP_VERSION}_attychen"
          BUILD_DATE=$(date -u +'%Y%m%d')
          echo "frp_version=$FRP_VERSION" >> $GITHUB_OUTPUT
          echo "panel_version=$PANEL_VERSION" >> $GITHUB_OUTPUT
          echo "build_date=$BUILD_DATE" >> $GITHUB_OUTPUT
          echo "FRP Version: v$FRP_VERSION"
          echo "Panel Version: $PANEL_VERSION"

  # ==================== 全架构二进制构建 (内联前端) ====================
  build-binaries:
    needs: [get-version]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # ─── Linux ───
          - os: linux
            goos: linux
            goarch: amd64
            goarm: ''
            gomips: ''
            ext: ''
            sufsfx: ''
          - os: linux
            goos: linux
            goarch: arm64
            goarm: ''
            gomips: ''
            ext: ''
            sufsfx: ''
          - os: linux
            goos: linux
            goarch: arm
            goarm: '7'
            gomips: ''
            ext: ''
            sufsfx: 'hf'
          - os: linux
            goos: linux
            goarch: arm
            goarm: '5'
            gomips: ''
            ext: ''
            sufsfx: ''
          - os: linux
            goos: linux
            goarch: mips64
            goarm: ''
            gomips: ''
            ext: ''
            sufsfx: ''
          - os: linux
            goos: linux
            goarch: mips64le
            goarm: ''
            gomips: ''
            ext: ''
            sufsfx: ''
          - os: linux
            goos: linux
            goarch: mips
            goarm: ''
            gomips: 'softfloat'
            ext: ''
            sufsfx: ''
          - os: linux
            goos: linux
            goarch: mipsle
            goarm: ''
            gomips: 'softfloat'
            ext: ''
            sufsfx: ''
          - os: linux
            goos: linux
            goarch: riscv64
            goarm: ''
            gomips: ''
            ext: ''
            sufsfx: ''
          - os: linux
            goos: linux
            goarch: loong64
            goarm: ''
            gomips: ''
            ext: ''
            sufsfx: ''
          # ─── Windows ───
          - os: windows
            goos: windows
            goarch: amd64
            goarm: ''
            gomips: ''
            ext: '.exe'
            sufsfx: ''
          - os: windows
            goos: windows
            goarch: arm64
            goarm: ''
            gomips: ''
            ext: '.exe'
            sufsfx: ''
          # ─── macOS ───
          - os: darwin
            goos: darwin
            goarch: amd64
            goarm: ''
            gomips: ''
            ext: ''
            sufsfx: ''
          - os: darwin
            goos: darwin
            goarch: arm64
            goarm: ''
            gomips: ''
            ext: ''
            sufsfx: ''
          # ─── FreeBSD ───
          - os: freebsd
            goos: freebsd
            goarch: amd64
            goarm: ''
            gomips: ''
            ext: ''
            sufsfx: ''
          # ─── Android ───
          - os: android
            goos: android
            goarch: arm64
            goarm: ''
            gomips: ''
            ext: ''
            sufsfx: ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: web/frps/package-lock.json

      - name: Build Vue frontend
        run: |
          cd web/frps
          npm install --force
          npm run build:ci

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Set build variables
        id: vars
        run: |
          ARCH_NAME="${{ matrix.os }}_${{ matrix.goarch }}${{ matrix.sufsfx }}"
          FRPS="acfrps_${{ needs.get-version.outputs.panel_version }}_${ARCH_NAME}${{ matrix.ext }}"
          FRPC="acfrpc_${{ needs.get-version.outputs.panel_version }}_${ARCH_NAME}${{ matrix.ext }}"
          echo "frps_name=$FRPS" >> $GITHUB_OUTPUT
          echo "frpc_name=$FRPC" >> $GITHUB_OUTPUT
          echo "Arch: $ARCH_NAME → $FRPS / $FRPC"

      - name: Build acfrps (frps server + 面板)
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          GOMIPS: ${{ matrix.gomips }}
        run: |
          BIN_NAME="${{ steps.vars.outputs.frps_name }}"
          go build -trimpath -ldflags="-s -w \
            -X '${{ env.MODULE_PATH }}/pkg.AppName=acfrps' \
            -X '${{ env.MODULE_PATH }}/pkg.AppVersion=${{ needs.get-version.outputs.panel_version }}' \
            -X '${{ env.MODULE_PATH }}/pkg.BuildTime=${{ needs.get-version.outputs.build_date }}' \
            -X '${{ env.MODULE_PATH }}/pkg.BinName=${BIN_NAME}'" \
            -o "${BIN_NAME}" ./cmd/frps
          chmod +x "${BIN_NAME}" 2>/dev/null || true
          sha256sum "${BIN_NAME}" > "${BIN_NAME}.sha256"
          ls -lh "${BIN_NAME}"

      - name: Build acfrpc (frpc client)
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          GOMIPS: ${{ matrix.gomips }}
        run: |
          BIN_NAME="${{ steps.vars.outputs.frpc_name }}"
          go build -trimpath -ldflags="-s -w \
            -X '${{ env.MODULE_PATH }}/pkg.AppName=acfrpc' \
            -X '${{ env.MODULE_PATH }}/pkg.AppVersion=${{ needs.get-version.outputs.panel_version }}' \
            -X '${{ env.MODULE_PATH }}/pkg.BuildTime=${{ needs.get-version.outputs.build_date }}' \
            -X '${{ env.MODULE_PATH }}/pkg.BinName=${BIN_NAME}'" \
            -o "${BIN_NAME}" ./cmd/frpc
          chmod +x "${BIN_NAME}" 2>/dev/null || true
          sha256sum "${BIN_NAME}" > "${BIN_NAME}.sha256"
          ls -lh "${BIN_NAME}"

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.os }}-${{ matrix.goarch }}${{ matrix.sufsfx }}
          path: |
            acfrps_*
            acfrpc_*
          retention-days: 7

  # ==================== Docker 多架构镜像 ====================
  build-docker:
    needs: [get-version]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push frps-panel (multi-arch)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ needs.get-version.outputs.panel_version }}
            ${{ env.IMAGE_NAME }}:latest
          build-args: |
            VERSION=${{ needs.get-version.outputs.panel_version }}
            BUILD_TIME=${{ needs.get-version.outputs.build_date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==================== 生成校验和汇总 + GitHub Release ====================
  create-release:
    needs: [get-version, build-binaries, build-docker]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: release/
          merge-multiple: true

      - name: Generate checksums & release info
        run: |
          cd release
          cat > RELEASE.md << 'RELEOF'
          ## 🚀 frps-panel ${{ needs.get-version.outputs.panel_version }}

          **Build Date:** ${{ needs.get-version.outputs.build_date }}
          **FRP Version:** v${{ needs.get-version.outputs.frp_version }}

          ### 🐳 Docker

          ```bash
          docker pull acallsh/frps-panel:${{ needs.get-version.outputs.panel_version }}
          docker pull acallsh/frps-panel:latest

          docker run -d --name frps-panel --network host \
            -v /etc/frp:/etc/frp \
            acallsh/frps-panel:latest
          ```

          ### 📦 二进制离线包

          ```bash
          # Linux amd64
          wget https://github.com/${{ github.repository }}/releases/download/${{ needs.get-version.outputs.panel_version }}/acfrps_${{ needs.get-version.outputs.panel_version }}_linux_amd64
          chmod +x acfrps_${{ needs.get-version.outputs.panel_version }}_linux_amd64
          ./acfrps_${{ needs.get-version.outputs.panel_version }}_linux_amd64 install

          # Linux arm64
          wget https://github.com/${{ github.repository }}/releases/download/${{ needs.get-version.outputs.panel_version }}/acfrps_${{ needs.get-version.outputs.panel_version }}_linux_arm64
          chmod +x acfrps_${{ needs.get-version.outputs.panel_version }}_linux_arm64
          ./acfrps_${{ needs.get-version.outputs.panel_version }}_linux_arm64 install
          ```

          ### 📋 文件列表
          RELEOF

          echo "" >> RELEASE.md
          echo "| 文件 | 大小 | SHA256 |" >> RELEASE.md
          echo "|------|------|--------|" >> RELEASE.md
          for f in *; do
            if [ -f "$f" ] && [ "$f" != "RELEASE.md" ]; then
              SIZE=$(ls -lh "$f" | awk '{print $5}')
              SHA=$(cat "$f.sha256" 2>/dev/null | awk '{print $1}' || echo "-")
              echo "| $f | $SIZE | $SHA |" >> RELEASE.md
            fi
          done

          # 合并校验和
          cat *.sha256 > go-frp-panel_sha256_checksums.txt 2>/dev/null || true
          rm -f *.sha256

          ls -lh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.get-version.outputs.panel_version }}
          name: frps-panel ${{ needs.get-version.outputs.panel_version }}
          body_path: release/RELEASE.md
          files: |
            release/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
