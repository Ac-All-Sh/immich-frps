name: Build and Release frps-panel

on:
  push:
    branches:
      - frps-panel
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - 'doc.html'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (留空自动生成)'
        required: false
        default: ''

env:
  REGISTRY: docker.io
  IMAGE_NAME: attychen/frps-panel

jobs:
  # ==================== 构建多架构 Docker 镜像 ====================
  build-docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate version tag
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=$(date +'%Y.%m.%d')-${GITHUB_SHA::7}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Build and push frps-panel (multi-arch)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.IMAGE_NAME }}:latest
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            BUILD_TIME=${{ github.event.repository.updated_at }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==================== 构建二进制离线包 ====================
  build-binaries:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: amd64
            goarch: amd64
            goarm: ''
          - arch: arm64
            goarch: arm64
            goarm: ''
          - arch: armv7
            goarch: arm
            goarm: '7'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Build Vue frontend
        run: |
          cd web/frps
          npm install --force
          npm run build

      - name: Build Go backend
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
        run: |
          VERSION=$(date +'%Y.%m.%d')-${GITHUB_SHA::7}
          BINARY="frps-panel_linux_${{ matrix.arch }}"

          # 复制前端产物
          mkdir -p web/frps/dist
          cp -r web/frps/dist/* web/frps/dist/ 2>/dev/null || true

          go build -trimpath -ldflags="-s -w \
            -X github.com/xxl6097/go-frp-panel/pkg.AppVersion=${VERSION} \
            -X github.com/xxl6097/go-frp-panel/pkg.BuildTime=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
            -o ${BINARY} ./cmd/server

          chmod +x ${BINARY}
          sha256sum ${BINARY} > ${BINARY}.sha256
          echo "Built: ${BINARY}"
          ls -lh ${BINARY}

      - name: Package offline bundle
        run: |
          ARCH=${{ matrix.arch }}
          BUNDLE="frps-panel_offline_linux_${ARCH}"

          mkdir -p ${BUNDLE}
          cp frps-panel_linux_${ARCH} ${BUNDLE}/frps-panel
          cp frps.toml ${BUNDLE}/frps.toml
          cp deploy_frps.sh ${BUNDLE}/deploy_frps.sh 2>/dev/null || true
          cp README.md ${BUNDLE}/README.md 2>/dev/null || true
          cp LICENSE ${BUNDLE}/LICENSE 2>/dev/null || true

          cat > ${BUNDLE}/install.sh << 'INSTALL_EOF'
          #!/bin/sh
          set -e
          BIN_DIR="/usr/local/bin"
          CONFIG_DIR="/etc/frp"
          echo "Installing frps-panel..."
          mkdir -p ${BIN_DIR} ${CONFIG_DIR}
          cp frps-panel ${BIN_DIR}/frps-panel
          chmod +x ${BIN_DIR}/frps-panel
          if [ ! -f ${CONFIG_DIR}/frps.toml ]; then
            cp frps.toml ${CONFIG_DIR}/frps.toml
          fi
          echo "frps-panel installed successfully!"
          echo "Run: frps-panel server -c ${CONFIG_DIR}/frps.toml"
          INSTALL_EOF
          chmod +x ${BUNDLE}/install.sh

          tar -czf ${BUNDLE}.tar.gz ${BUNDLE}
          sha256sum ${BUNDLE}.tar.gz > ${BUNDLE}.tar.gz.sha256
          echo "Packaged: ${BUNDLE}.tar.gz"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: frps-panel-${{ matrix.arch }}
          path: |
            frps-panel_linux_${{ matrix.arch }}
            frps-panel_linux_${{ matrix.arch }}.sha256
            frps-panel_offline_linux_${{ matrix.arch }}.tar.gz
            frps-panel_offline_linux_${{ matrix.arch }}.tar.gz.sha256

  # ==================== 创建 GitHub Release ====================
  create-release:
    needs: [build-docker, build-binaries]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate version tag
        id: version
        run: |
          VERSION=$(date +'%Y.%m.%d')-${GITHUB_SHA::7}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: frps-panel v${{ steps.version.outputs.version }}
          body: |
            ## 🚀 frps-panel v${{ steps.version.outputs.version }}

            frps Web 可视化管理面板，集成智能优化引擎、实时监控、带宽管理。

            ### 🐳 Docker 部署（推荐）

            ```bash
            docker pull attychen/frps-panel:${{ steps.version.outputs.version }}
            docker pull attychen/frps-panel:latest

            # amd64
            docker run -d --name frps-panel --network host \
              -v /etc/frp:/etc/frp \
              -v /var/log/frp:/var/log/frp \
              attychen/frps-panel:latest

            # arm64
            docker run -d --name frps-panel --network host \
              -v /etc/frp:/etc/frp \
              -v /var/log/frp:/var/log/frp \
              attychen/frps-panel:latest
            ```

            ### 📦 离线包部署

            ```bash
            # amd64
            wget https://github.com/${{ github.repository }}/releases/download/v${{ steps.version.outputs.version }}/frps-panel_offline_linux_amd64.tar.gz
            tar -xzf frps-panel_offline_linux_amd64.tar.gz
            cd frps-panel_offline_linux_amd64 && bash install.sh

            # arm64
            wget https://github.com/${{ github.repository }}/releases/download/v${{ steps.version.outputs.version }}/frps-panel_offline_linux_arm64.tar.gz
            tar -xzf frps-panel_offline_linux_arm64.tar.gz
            cd frps-panel_offline_linux_arm64 && bash install.sh

            # armv7 (树莓派)
            wget https://github.com/${{ github.repository }}/releases/download/v${{ steps.version.outputs.version }}/frps-panel_offline_linux_armv7.tar.gz
            tar -xzf frps-panel_offline_linux_armv7.tar.gz
            cd frps-panel_offline_linux_armv7 && bash install.sh
            ```

            ### ✨ 面板功能

            | 功能 | 说明 |
            |------|------|
            | 📊 监控仪表盘 | 实时流量、连接数、CPU/内存 |
            | ⚡ 智能优化 | 自动计算最优 TCP 参数 |
            | 📡 带宽管理 | 限速、流量统计 |
            | 🛡️ 防火墙 | IP 黑白名单 |
            | 🌐 国际化 | 中文/English |
          files: |
            artifacts/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
